services:
  - type: web
    name: somiprophet
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: ACTIVE_NETWORK
        value: testnet
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      # The secret ones below are set in the Render dashboard, NOT here:
      # CLAUDE_API_KEY, FALCON_API_TOKEN, GNEWS_API_KEY
